schema: spec-driven

context: |
  Tech stack: Rust, async/await, embedded systems
  Language: Rust (latest stable)
  Testing: defmt-test, probe-rs
  Formatting: rustfmt
  Project: Embassy - next-generation embedded async framework
  Architecture: Multi-crate workspace (40+ embassy-* crates)
  Targets: STM32, nRF, RP2040/235x, ESP32, NXP, TI MSPM0
  所有产出物必须用简体中文撰写。
  技术术语如 API、HAL、async/await 保持英文原样。

rules:
  proposal:
    - 包含回滚方案
    - 说明为什么做、做什么、不做什么
    - 标注影响范围（哪些 crate 受影响）
    - 考虑跨平台兼容性（STM32/nRF/RP 等）
  specs:
    - 使用 Given/When/Then 格式描述行为
    - 每个 spec.md 包含版本号和最后更新日期
    - 变更时使用 Delta Specs（ADDED/MODIFIED/REMOVED）
    - 标注适用的硬件平台
  design:
    - 复杂流程需包含序列图
    - 标注关键依赖关系
    - 包含备选方案对比
    - 考虑资源约束（内存、CPU、功耗）
  tasks:
    - 每个任务可独立验证
    - 标注依赖关系
    - 包含验收标准
    - 标注影响的 crate
