# Project info
site_name: Embassy 学习笔记
site_description: Embassy 嵌入式异步框架的系统性源码分析与学习记录(M1 基础架构 + M2 核心组件)
site_author: daivy
site_url: https://daivy2333.github.io/embassy/

# Repository
repo_name: daivy2333/embassy
repo_url: https://github.com/daivy2333/embassy
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 daivy · 基于 Embassy(<a href="https://github.com/embassy-rs/embassy">embassy-rs/embassy</a>)的学习研究项目

# Theme
theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Navigation
# 注:M3-M7 章节文件创建后再添加到 nav,否则 mkdocs build --strict 会报错
nav:
  - 首页: index.md
  - 项目概览: embassy.md
  - M1 基础架构:
    - 01 项目结构: 01-overview.md
    - 02 crate 架构: 02-architecture.md
    - 03 异步基础: 03-async-fundamentals.md
  - M2 核心组件:
    - 04 执行器 embassy-executor: 04-executor.md
    - 05 时间管理 embassy-time: 05-time.md
    - 06 同步原语 embassy-sync: 06-sync.md
    - 07 异步工具 embassy-futures: 07-futures.md

# 排除 docs/ 下不参与构建的文件(build 阶段就剔除,不读不渲染)
# 注意:必须用 exclude_docs 而不是 not_in_nav。
# not_in_nav 只控"不放侧栏"但仍会 build,会与 index.md 在 use_directory_urls=true 下
# 都映射到 /index.html 冲突 → strict 模式 WARNING 被当 Error。
exclude_docs: |
  README.md

# Plugins
plugins:
  - search:
      lang:
        - zh
        - en

# Markdown extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: 锚点链接
  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/daivy2333/embassy
      name: GitHub Repository
  generator: false  # 隐藏底部 "Made with Material for MkDocs"(可选,如想保留致谢可删此行)
